name: Monitor Australia WHV 462 - Spain

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:         # Ejecución manual desde GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Comprobar estado Spain
        run: python monitor.py
        # Si Spain cambia de "paused", exit(1) -> Actions falla -> GitHub te manda email

      - name: Guardar nuevo valor
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ultimo_valor.txt
          git diff --staged --quiet || git commit -m "Update: estado Spain actualizado"
          git push || true
